services:
  caddy:
    build:
      context: .
      dockerfile: staging/caddy/dockerfile
    image: ${REGISTRY:-localhost}/runarion-caddy:${TAG:-staging}
    depends_on:
      laravel-php:
        condition: service_healthy
      laravel-reverb:
        condition: service_started
    ports:
      - "${STAGING_HTTP_PORT:-80}:80"
      - "${STAGING_HTTPS_PORT:-443}:443"
    environment:
      STAGING_DOMAIN: ${STAGING_DOMAIN}
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - laravel_storage:/srv/storage:ro
      - laravel_public_build:/srv/public/build:ro
    networks:
      - runarion-network
    restart: unless-stopped
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  laravel-php:
    build:
      context: ./runarion-laravel
      dockerfile: dockerfile.staging
    image: ${REGISTRY:-localhost}/runarion-laravel:${TAG:-staging}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Runarion}
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      APP_LOCALE: ${APP_LOCALE:-en}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-en_US}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      SESSION_DOMAIN: ${SESSION_DOMAIN}
      SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
      SESSION_SAME_SITE: ${SESSION_SAME_SITE:-lax}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-info@runarion.example.com}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Runarion}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://python-app:5000}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: laravel-reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_HOSTNAME: ${REVERB_HOSTNAME:-${STAGING_DOMAIN}}
      REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS}
      REVERB_SCALING_ENABLED: ${REVERB_SCALING_ENABLED:-false}
      VITE_APP_NAME: ${VITE_APP_NAME:-Runarion}
      VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
      VITE_REVERB_CLIENT_HOST: ${VITE_REVERB_CLIENT_HOST:-${STAGING_DOMAIN}}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT:-443}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME:-https}
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
      GOOGLE_DRIVE_CLIENT_ID: ${GOOGLE_DRIVE_CLIENT_ID:-}
      GOOGLE_DRIVE_CLIENT_SECRET: ${GOOGLE_DRIVE_CLIENT_SECRET:-}
      GOOGLE_DRIVE_REDIRECT_URI: ${GOOGLE_DRIVE_REDIRECT_URI:-}
      DROPBOX_CLIENT_ID: ${DROPBOX_CLIENT_ID:-}
      DROPBOX_CLIENT_SECRET: ${DROPBOX_CLIENT_SECRET:-}
      DROPBOX_REDIRECT_URI: ${DROPBOX_REDIRECT_URI:-}
      ONEDRIVE_CLIENT_ID: ${ONEDRIVE_CLIENT_ID:-}
      ONEDRIVE_CLIENT_SECRET: ${ONEDRIVE_CLIENT_SECRET:-}
      ONEDRIVE_REDIRECT_URI: ${ONEDRIVE_REDIRECT_URI:-}
    volumes:
      - laravel_storage:/srv/storage
      - laravel_public_build:/srv/public/build
    networks:
      - runarion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t >/dev/null 2>&1 && test -f /srv/public/index.php && test -f /srv/public/build/manifest.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  laravel-queue:
    image: ${REGISTRY:-localhost}/runarion-laravel:${TAG:-staging}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Runarion}
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://python-app:5000}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: laravel-reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME:-}
    command: ["php", "artisan", "queue:work", "--tries=2", "--timeout=900", "--max-jobs=500", "--max-time=3600", "--sleep=3", "--rest=0", "--no-interaction"]
    volumes:
      - laravel_storage:/srv/storage
    networks:
      - runarion-network
    restart: unless-stopped
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  laravel-reverb:
    image: ${REGISTRY:-localhost}/runarion-laravel:${TAG:-staging}
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Runarion}
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: 0.0.0.0
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      REVERB_HOSTNAME: ${REVERB_HOSTNAME:-${STAGING_DOMAIN}}
      REVERB_ALLOWED_ORIGINS: ${REVERB_ALLOWED_ORIGINS}
      REVERB_SCALING_ENABLED: ${REVERB_SCALING_ENABLED:-false}
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    volumes:
      - laravel_storage:/srv/storage
    networks:
      - runarion-network
    restart: unless-stopped
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  laravel-migrate:
    image: ${REGISTRY:-localhost}/runarion-laravel:${TAG:-staging}
    profiles: ["ops"]
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME:-Runarion}
      APP_ENV: ${APP_ENV:-staging}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: ${LOG_CHANNEL:-stderr}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_CACHE_DB: ${REDIS_CACHE_DB:-1}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      CACHE_DRIVER: ${CACHE_DRIVER:-redis}
      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL:-http://python-app:5000}
      BROADCAST_CONNECTION: reverb
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: laravel-reverb
      REVERB_PORT: 8080
      REVERB_SCHEME: http
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
    command: ["php", "artisan", "migrate", "--force", "--no-interaction"]
    volumes:
      - laravel_storage:/srv/storage
    networks:
      - runarion-network

  python-app:
    build:
      context: ./runarion-python
      dockerfile: dockerfile.staging
    image: ${REGISTRY:-localhost}/runarion-python:${TAG:-staging}
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      ENVIRONMENT: ${APP_ENV:-staging}
      APP_LOG_LEVEL: ${PYTHON_LOG_LEVEL:-INFO}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_HOST: postgres-db
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME}
      UPLOAD_PATH: /app/uploads
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      DB_POOL_MIN_CONN: "2"
      DB_POOL_MAX_CONN: "50"
    volumes:
      - python_uploads:/app/uploads
    networks:
      - runarion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  redis:
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c "
        if [ -z \"$$REDIS_PASSWORD\" ]; then
          echo 'REDIS_PASSWORD must be set for staging' >&2;
          exit 1;
        fi &&
        redis-server --requirepass $$REDIS_PASSWORD --maxmemory 200m --maxmemory-policy allkeys-lru
      "
    volumes:
      - redis_data:/data
    networks:
      - runarion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

  postgres-db:
    build:
      context: .
      dockerfile: dockerfile.staging
      args:
        AGE_REF: ${AGE_REF}
    image: ${REGISTRY:-localhost}/runarion-postgres-age:${TAG:-staging}
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_DB: ${DB_DATABASE:-runarion}
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
      PGDATA: /var/lib/postgresql/data
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
      POSTGRES_SHARED_PRELOAD_LIBRARIES: age
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - runarion-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-runarion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: ${LOG_DRIVER:-json-file}
      options:
        max-size: ${LOG_MAX_SIZE:-10m}
        max-file: ${LOG_MAX_FILE:-3}

networks:
  runarion-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  laravel_public_build:
  laravel_storage:
  postgres_data:
  python_uploads:
  redis_data:
