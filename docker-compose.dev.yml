services:
  laravel-app:
    build:
      context: ./runarion-laravel
      dockerfile: dockerfile
    ports:
      - "${VITE_PORT:-5173}:5173"
      - "${LARAVEL_PORT:-8000}:8000"
      - "${REVERB_PORT:-8080}:8080"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: ${APP_URL}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      PYTHON_SERVICE_URL: ${PYTHON_SERVICE_URL}
      APP_LOCALE: ${APP_LOCALE}
      APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE}
      APP_FAKER_LOCALE: ${APP_FAKER_LOCALE}
      PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS}
      VITE_PORT: ${VITE_PORT}
      VITE_HOST: ${VITE_HOST}
      VITE_SERVICE_URL: ${VITE_SERVICE_URL}
      BROADCAST_CONNECTION: ${BROADCAST_CONNECTION}
      REVERB_APP_ID: ${REVERB_APP_ID}
      REVERB_APP_KEY: ${REVERB_APP_KEY}
      REVERB_APP_SECRET: ${REVERB_APP_SECRET}
      REVERB_HOST: ${REVERB_HOST}
      REVERB_PORT: ${REVERB_PORT}
      REVERB_SCHEME: ${REVERB_SCHEME}
      REVERB_DEBUG: ${REVERB_DEBUG:-true}
      VITE_REVERB_APP_KEY: ${VITE_REVERB_APP_KEY}
      VITE_REVERB_HOST: ${VITE_REVERB_HOST}
      VITE_REVERB_PORT: ${VITE_REVERB_PORT}
      VITE_REVERB_SCHEME: ${VITE_REVERB_SCHEME}
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
      NODE_OPTIONS: ${NODE_OPTIONS:-"--max_old_space_size=2048"}
      NPM_CONFIG_CACHE: "/tmp/npm-cache"
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-"true"}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-"true"}
    volumes:
      - type: bind
        source: ./runarion-laravel
        target: /var/www/html
        consistency: delegated
      - type: volume
        source: node_modules
        target: /var/www/html/node_modules
      - type: volume
        source: vendor
        target: /var/www/html/vendor
      - type: volume
        source: npm_cache
        target: /tmp/npm-cache
    networks:
      - runarion-network
    depends_on:
      postgres-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${LARAVEL_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: ${LOG_DRIVER}
      options:
        max-size: ${LOG_MAX_SIZE}
        max-file: ${LOG_MAX_FILE}
    deploy:
      resources:
        limits:
          memory: ${LARAVEL_MEMORY_LIMIT}
        reservations:
          memory: ${LARAVEL_MEMORY_RESERVATION}
    command: >
      sh -c "
        echo '[Startup] Checking dependencies...' &&
        if [ ! -d 'node_modules/.vite' ] || [ 'package-lock.json' -nt 'node_modules/.package-lock.json' ]; then
          echo '[Startup] Installing npm dependencies...' &&
          npm install --legacy-peer-deps --prefer-offline --no-audit;
        else
          echo '[Startup] npm dependencies are up to date';
        fi &&
        if ! grep -q 'APP_KEY=base64:' .env 2>/dev/null; then
          echo '[Startup] Generating application key...' &&
          php artisan key:generate --force;
        else
          echo '[Startup] Application key already exists';
        fi &&
        echo '[Startup] Starting services...' &&
        /bin/bash /var/www/html/docker-entrypoint.sh
      "
             
  python-app:
    build:
      context: ./runarion-python
      dockerfile: dockerfile
    ports:
      - "${PYTHON_PORT:-5000}:5000"
    environment:
      ENVIRONMENT: development
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GEMINI_MODEL_NAME: ${GEMINI_MODEL_NAME}
      OPENAI_MODEL_NAME: ${OPENAI_MODEL_NAME}
      DEEPSEEK_MODEL_NAME: ${DEEPSEEK_MODEL_NAME}
      FLASK_ENV: ${FLASK_ENV:-development}
      FLASK_DEBUG: ${FLASK_DEBUG:-"1"}
      PYTHONPATH: ${PYTHON_PYTHONPATH:-/app/src}
      PYTHONDONTWRITEBYTECODE: ${PYTHON_PYTHONDONTWRITEBYTECODE:-1}
      PYTHONUNBUFFERED: ${PYTHON_PYTHONUNBUFFERED:-1}
      UPLOAD_PATH: ${PYTHON_UPLOAD_PATH:-/app/uploads}
      TEST_DATABASE_URL: ${TEST_DATABASE_URL:-}
      AGE_ENABLED: ${AGE_ENABLED:-true}
      AGE_GRAPH_NAME: ${AGE_GRAPH_NAME:-novel_pipeline_graph}
    volumes:
      - ./runarion-python/src:/app/src
      - ./runarion-python/tests:/app/tests
      - python_uploads:/app/uploads
      - ./runarion-python/requirements.txt:/app/requirements.txt
      - python_venv:/app/venv
    networks:
      - runarion-network
    depends_on:
      postgres-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://python-app:${PYTHON_PORT:-5000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: ${LOG_DRIVER}
      options:
        max-size: ${LOG_MAX_SIZE}
        max-file: ${LOG_MAX_FILE}
    deploy:
      resources:
        limits:
          memory: ${PYTHON_MEMORY_LIMIT}
        reservations:
          memory: ${PYTHON_MEMORY_RESERVATION}
    command: ["/bin/bash", "/app/docker-entrypoint.sh"]
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - runarion-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEMORY_LIMIT:-256M}
        reservations:
          memory: ${REDIS_MEMORY_RESERVATION:-128M}
    logging:
      driver: ${LOG_DRIVER}
      options:
        max-size: ${LOG_MAX_SIZE}
        max-file: ${LOG_MAX_FILE}
    command: >
      sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-server --requirepass $$REDIS_PASSWORD --maxmemory 200m --maxmemory-policy allkeys-lru
        else
          redis-server --maxmemory 200m --maxmemory-policy allkeys-lru
        fi
      "
          
  postgres-db:
    build:
      context: .
      dockerfile: dockerfile
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_DB=${DB_DATABASE:-runarion}
      - POSTGRES_HOST_AUTH_METHOD=${POSTGRES_HOST_AUTH_METHOD:-scram-sha-256}
      - POSTGRES_INITDB_WALDIR=${POSTGRES_INITDB_WALDIR:-}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS:-}
      - PG_MAJOR=${PG_MAJOR:-16}
      - PG_VERSION=${PG_VERSION:-16.10-1.pgdg120+1}
      - PGDATA=${PGDATA:-/var/lib/postgresql/data}
      - POSTGRES_GID=${POSTGRES_GID:-999}
      - POSTGRES_UID=${POSTGRES_UID:-999}
      - GOSU_VERSION=${GOSU_VERSION:-1.17}
      - LANG=${LANG:-en_US.utf8}
      - AGE_ENABLED=${AGE_ENABLED:-true}
      - AGE_GRAPH_NAME=${AGE_GRAPH_NAME:-novel_pipeline_graph}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - runarion-network
    deploy:
      resources:
        limits:
          memory: ${POSTGRES_MEMORY_LIMIT:-1G}
        reservations:
          memory: ${POSTGRES_MEMORY_RESERVATION:-512M}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_DATABASE:-runarion}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

