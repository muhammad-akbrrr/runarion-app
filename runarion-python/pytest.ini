[pytest]
# Pytest configuration for Runarion deconstructor pipeline testing

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: Integration tests requiring full services
    slow: Slow tests that take more than 30 seconds
    database: Tests that require database access
    stage: Tests for individual pipeline stages
    api: Tests for API endpoints
    real_api: Tests that make real API calls and consume tokens (default for all tests)
    expensive: Tests that consume significant API quota/costs
    performance: Performance and load tests
    regression: Regression tests for known issues

# Test output and reporting
addopts = 
    --strict-markers
    --tb=short
    --disable-warnings
    --durations=10
    --color=yes
    -v

# Coverage settings
# Run with: pytest --cov=src --cov-report=html
# Coverage will be generated in htmlcov/ directory

# Test environment
env =
    ENVIRONMENT = test
    TESTING = true
    PYTHONPATH = /app
    TEST_OUTPUT_PATH = /app/tests/outputs/
    TEST_EXPECTED_OUTPUTS_PATH = /app/tests/outputs/
    TEST_TEMP_OUTPUTS_PATH = /app/tests/outputs/temp
    TEST_CONFIGS_PATH = /app/tests/sample_files/test_configs
    TEST_SAMPLE_FILES_PATH = /app/tests/sample_files

# Timeout settings (in seconds)
timeout = 300
timeout_method = thread

# Database settings for tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning

# Logging during tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Minimum version requirements
minversion = 7.0
