[mypy]
python_version = 3.12
files = src
ignore_missing_imports = True
check_untyped_defs = False
disallow_untyped_defs = False
disallow_incomplete_defs = False
no_implicit_optional = False
warn_unused_ignores = False

[mypy-src.api.*]
ignore_errors = True

[mypy-src.services.*]
ignore_errors = True

[mypy-src.providers.*]
ignore_errors = True

[mypy-src.utils.api_response]
ignore_errors = True

[mypy-src.utils.document_processor]
ignore_errors = True

[mypy-src.utils.database_utils]
ignore_errors = True

[mypy-src.utils.json_response_parser]
ignore_errors = True

[mypy-src.utils.logging_config]
ignore_errors = True

[mypy-src.utils.token_counter]
ignore_errors = True
